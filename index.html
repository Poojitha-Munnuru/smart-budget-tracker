<!DOCTYPE html>
<html>
<head>
<title>Smart Budget Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>💰 Smart Budget Tracker</h1>

<div class="container">

<h2>Your Balance</h2>
<h2 id="balance">₹0</h2>

<div class="summary">

<div class="income">
<h4>Income</h4>
<p id="income">₹0</p>
</div>

<div class="expense">
<h4>Expense</h4>
<p id="expense">₹0</p>
</div>

</div>

<h3>Add Transaction</h3>

<input type="text" id="text" placeholder="Description">
<input type="number" id="amount" placeholder="Amount (+income, -expense)">

<button onclick="addTransaction()">Add</button>

<h3>History</h3>
<ul id="list"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
